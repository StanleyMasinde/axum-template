name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure tag matches Cargo.toml version
        shell: bash
        run: |
          version=$(grep '^version = ' Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/')

          if [[ -z "$version" ]]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi

          expected_tag="v${version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Expected tag ${expected_tag}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  frontend-assets:
    needs: create-release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Package frontend assets
        run: tar -czf ../frontend.tar.gz -C dist .

      - name: Upload frontend assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${GITHUB_REF_NAME}" ../frontend.tar.gz --clobber

  binaries:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exe_suffix: ""
          - os: macos-latest
            exe_suffix: ""
          - os: windows-latest
            exe_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    env:
      GH_REPO: ${{ github.repository }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release binary
        env:
          EXE_SUFFIX: ${{ matrix.exe_suffix }}
          ARCHIVE_NAME: ${{ github.event.repository.name }}-${{ runner.os }}-${{ runner.arch }}.tar.gz
        run: |
          bin_name=$(grep '^name = ' Cargo.toml | head -n1 | sed -E 's/name = "(.*)"/\1/')

          if [[ -z "$bin_name" ]]; then
            echo "Could not read package name from Cargo.toml" >&2
            exit 1
          fi

          bin_name="${bin_name}${EXE_SUFFIX}"
          mkdir -p release
          cp "target/release/${bin_name}" "release/${bin_name}"
          tar -czf "${ARCHIVE_NAME}" -C release "${bin_name}"

      - name: Upload release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ARCHIVE_NAME: ${{ github.event.repository.name }}-${{ runner.os }}-${{ runner.arch }}.tar.gz
        run: gh release upload "${GITHUB_REF_NAME}" "${ARCHIVE_NAME}" --clobber

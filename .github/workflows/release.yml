name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure tag matches Cargo.toml version
        shell: bash
        run: |
          version=$(grep '^version = ' Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/')

          if [[ -z "$version" ]]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi

          expected_tag="v${version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Expected tag ${expected_tag}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  frontend-assets:
    needs: create-release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Package frontend assets
        run: tar -czf ../frontend.tar.gz -C dist .

      - name: Upload frontend assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${GITHUB_REF_NAME}" ../frontend.tar.gz --clobber

  binaries:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            archive_ext: tar.gz
            exe_suffix: ""
          - os: macos-13
            target: x86_64-apple-darwin
            platform: darwin-x86_64
            archive_ext: tar.gz
            exe_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-aarch64
            archive_ext: tar.gz
            exe_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive_ext: zip
            exe_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    env:
      GH_REPO: ${{ github.repository }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          bin_name=$(grep '^name = ' Cargo.toml | head -n1 | sed -E 's/name = "(.*)"/\1/')

          if [[ -z "$bin_name" ]]; then
            echo "Could not read package name from Cargo.toml" >&2
            exit 1
          fi

          echo "bin_name=${bin_name}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        env:
          GH_REPO: ${{ github.repository }}
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package release binary
        env:
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          ASSET_NAME: ${{ matrix.platform }}.${{ matrix.archive_ext }}
          BIN_NAME: ${{ steps.package.outputs.bin_name }}
          EXE_SUFFIX: ${{ matrix.exe_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          packaged_bin="${BIN_NAME}${EXE_SUFFIX}"
          mkdir -p release
          cp "target/${TARGET}/release/${packaged_bin}" "release/${packaged_bin}"

          case "${ARCHIVE_EXT}" in
            tar.gz)
              tar -czf "${ASSET_NAME}" -C release "${packaged_bin}"
              ;;
            zip)
              powershell.exe -NoProfile -Command "Compress-Archive -Path 'release/${packaged_bin}' -DestinationPath '${ASSET_NAME}'"
              ;;
            *)
              echo "Unsupported archive extension: ${ARCHIVE_EXT}" >&2
              exit 1
              ;;
          esac

      - name: Upload release binary
        env:
          ASSET_NAME: ${{ steps.package.outputs.bin_name }}-${{ matrix.platform }}.${{ matrix.archive_ext }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${GITHUB_REF_NAME}" "${ASSET_NAME}" --clobber
